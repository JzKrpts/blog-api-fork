name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Run Ruff (All Workspace)
        run: uv run ruff check .

      - name: Run Mypy
        env:
          DJANGO_SETTINGS_MODULE: backend.config.settings
          SECRET_KEY: "ci-dummy-key"
          DATABASE_URL: "sqlite:///:memory:"
          PYTHON_PATH: ${{ github.workspace }}/backend/src
        run: uv run mypy backend/src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Run Django Tests
        env:
          SECRET_KEY: "ci-dummy-key"
          ALLOWED_HOSTS: "localhost"
          DATABASE_URL: "sqlite:///:memory:"
        run: uv run --package backend manage.py test
